<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshot.json 終極戰情預覽器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-8 font-sans h-screen flex flex-col">
    <!-- Header 區塊 -->
    <div class="mb-4 flex justify-between items-center bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg shrink-0">
        <div>
            <h1 class="text-2xl font-black text-blue-400 mb-1">📊 快照資料核對沙盤</h1>
            <p class="text-slate-400 text-sm">完全離線運作，請匯入由 Local DB 結算得出嘅 snapshot.json</p>
        </div>
        <div class="flex items-center gap-4">
            <input type="file" id="fileInput" accept=".json" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md active:scale-95">
                📂 載入 Snapshot.json
            </button>
        </div>
    </div>

    <!-- 搜尋列 -->
    <div class="mb-6 shrink-0 hidden" id="searchContainer">
        <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                </svg>
            </div>
            <input type="text" id="searchInput" onkeyup="handleSearch(event)" class="block w-full p-4 pl-12 text-sm text-slate-100 border border-slate-700 rounded-xl bg-slate-800 focus:ring-blue-500 focus:border-blue-500 placeholder-slate-400 shadow-inner transition-colors" placeholder="🔍 搜尋任何欄位資料...">
        </div>
    </div>

    <!-- 統計數據 Bar -->
    <div id="statsBar" class="grid grid-cols-4 gap-4 mb-6 shrink-0 hidden">
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700"><div class="text-slate-400 text-xs">當前顯示數量</div><div id="totalCount" class="text-2xl font-bold">0</div></div>
        <div class="bg-slate-800 p-4 rounded-xl border border-green-900/50"><div class="text-green-400 text-xs">真降價 / 變價</div><div id="dropCount" class="text-2xl font-bold text-green-400">0</div></div>
        <div class="bg-slate-800 p-4 rounded-xl border border-orange-900/50"><div class="text-orange-400 text-xs">優惠變動</div><div id="promoCount" class="text-2xl font-bold text-orange-400">0</div></div>
        <div class="bg-slate-800 p-4 rounded-xl border border-blue-900/50"><div class="text-blue-400 text-xs">首次上架</div><div id="newCount" class="text-2xl font-bold text-blue-400">0</div></div>
    </div>

    <!-- 資料表 -->
    <div class="flex-1 overflow-hidden bg-slate-800 rounded-2xl border border-slate-700 shadow-lg flex flex-col">
        <div class="overflow-auto flex-1 p-0 custom-scrollbar">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-slate-900 sticky top-0 z-10 shadow-md">
                    <tr id="tableHead">
                        <!-- 動態生成表頭 -->
                        <th class="p-4 font-bold text-slate-300">請載入檔案...</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-700/50">
                    <tr><td class="p-8 text-center text-slate-500 font-bold">請先點擊右上角載入 JSON 檔案...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = [];
        let filteredData = [];
        let allColumns = [];
        let sortCol = '';
        let sortAsc = true;
        let searchTerm = '';

        // 核心欄位配置 (控制排位同 UI，未定義嘅 Keys 會自動排喺後面)
        const colConfig = {
            'sm': { label: '超市', class: 'font-bold text-blue-300' },
            'supermarket_code': { label: '超市', class: 'font-bold text-blue-300' },
            'id': { label: '貨品 ID', class: 'text-slate-400 text-xs' },
            'product_id': { label: '貨品 ID', class: 'text-slate-400 text-xs' },
            'c1': { label: '分類', class: 'text-slate-400 text-xs truncate max-w-[150px]' },
            'category': { label: '分類', class: 'text-slate-400 text-xs truncate max-w-[150px]' },
            'b': { label: '品牌', class: 'text-slate-300' },
            'brand_zh_hant': { label: '品牌', class: 'text-slate-300' },
            'n': { label: '貨品名稱', class: 'text-slate-100 font-medium truncate max-w-xs' },
            'name_zh_hant': { label: '貨品名稱', class: 'text-slate-100 font-medium truncate max-w-xs' },
            'Status': { label: '異動狀態', isBadge: true },
            'change_status': { label: '異動狀態', isBadge: true },
            'cb_p': { label: '最新折實價', isPrice: true, class: 'font-black text-emerald-400' },
            'current_effective_price': { label: '最新折實價', isPrice: true, class: 'font-black text-emerald-400' },
            'pb_p': { label: '上次折實價', isPrice: true, class: 'text-slate-500 line-through decoration-slate-500/50' },
            'previous_effective_price': { label: '上次折實價', isPrice: true, class: 'text-slate-500 line-through decoration-slate-500/50' },
            'o': { label: '最新優惠', class: 'text-slate-400 text-xs truncate max-w-[200px]' },
            'crawl_time': { label: '數據抓取時間', class: 'text-slate-500 text-xs' }
        };

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const json = JSON.parse(evt.target.result);
                    currentData = Array.isArray(json) ? json : (json.results || []);
                    filteredData = currentData;
                    
                    // 動態提取所有獨特 Keys
                    const keySet = new Set();
                    currentData.forEach(item => Object.keys(item).forEach(k => keySet.add(k)));
                    allColumns = Array.from(keySet);

                    // 排序 Keys：將 config 有定義嘅核心欄位排前面
                    allColumns.sort((a, b) => {
                        const idxA = Object.keys(colConfig).indexOf(a);
                        const idxB = Object.keys(colConfig).indexOf(b);
                        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                        if (idxA !== -1) return -1;
                        if (idxB !== -1) return 1;
                        return 0;
                    });

                    document.getElementById('searchContainer').classList.remove('hidden');
                    document.getElementById('statsBar').classList.remove('hidden');
                    document.getElementById('searchInput').value = '';
                    searchTerm = '';
                    
                    renderHeaders();
                    renderTable();
                } catch (err) {
                    alert('JSON 解析失敗，請確保檔案格式正確：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function handleSearch(e) {
            searchTerm = e.target.value.toLowerCase().trim();
            if (!searchTerm) {
                filteredData = currentData;
            } else {
                filteredData = currentData.filter(item => {
                    // 全欄位文字搜尋
                    const searchString = allColumns.map(col => item[col] || '').join(' ').toLowerCase();
                    return searchString.includes(searchTerm);
                });
            }
            if(sortCol) applySorting(); 
            else renderTable();
        }

        function getStatusBadge(status) {
            if (status === 'PRICE_CHANGED' || status === 'PRICE_AND_OFFER_CHANGED') return '<span class="px-2 py-1 bg-green-900/30 text-green-400 border border-green-800 rounded text-xs font-bold shadow-sm">變價 / 真降價</span>';
            if (status === 'OFFER_CHANGED') return '<span class="px-2 py-1 bg-orange-900/30 text-orange-400 border border-orange-800 rounded text-xs font-bold shadow-sm">優惠變動</span>';
            if (status === 'NEW_ADDED') return '<span class="px-2 py-1 bg-blue-900/30 text-blue-400 border border-blue-800 rounded text-xs font-bold shadow-sm">新上架</span>';
            if (status === 'DROP_OUT') return '<span class="px-2 py-1 bg-red-900/30 text-red-400 border border-red-800 rounded text-xs font-bold shadow-sm">下架 / 缺貨</span>';
            if (status === 'BASELINE') return '<span class="px-2 py-1 bg-slate-700 text-slate-400 rounded text-xs">維持不變</span>';
            return `<span class="px-2 py-1 bg-slate-700 text-slate-400 rounded text-xs">${status}</span>`;
        }

        function renderHeaders() {
            const tr = document.getElementById('tableHead');
            let html = '';
            allColumns.forEach(col => {
                const config = colConfig[col] || {};
                const label = config.label || col; // 無定義嘅 key 就直接顯示原名
                html += `<th class="p-4 font-bold text-slate-300 cursor-pointer hover:text-white transition-colors whitespace-nowrap" onclick="sortTable('${col}')">${label} ⇅</th>`;
            });
            tr.innerHTML = html;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            updateStats();

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${allColumns.length || 1}" class="p-8 text-center text-slate-500">搵唔到相關資料</td></tr>`;
                return;
            }

            let html = '';
            // 預設渲染 2000 筆防止爆 RAM
            const displayData = filteredData.slice(0, 2000); 

            displayData.forEach(item => {
                html += '<tr class="hover:bg-slate-700/30 transition-colors">';
                allColumns.forEach(col => {
                    const config = colConfig[col] || {};
                    let val = item[col];
                    
                    if (val === undefined || val === null || val === '') {
                        val = '-';
                    }
                    
                    if (config.isBadge && val !== '-') {
                        val = getStatusBadge(val);
                    } else if (config.isPrice && val !== '-') {
                        val = `$${val}`;
                    }

                    // 處理 CSS 樣式同截斷文字 tooltip
                    let cssClass = `p-4 text-sm whitespace-nowrap ${config.class || 'text-slate-300'}`;
                    let titleAttr = (config.class && config.class.includes('truncate')) ? `title="${String(val).replace(/"/g, '&quot;')}"` : '';

                    html += `<td class="${cssClass}" ${titleAttr}>${val}</td>`;
                });
                html += '</tr>';
            });
            tbody.innerHTML = html;
        }

        function updateStats() {
            document.getElementById('totalCount').innerText = filteredData.length;
            document.getElementById('dropCount').innerText = filteredData.filter(d => {
                const status = d.Status || d.change_status;
                return ['PRICE_CHANGED', 'PRICE_AND_OFFER_CHANGED'].includes(status);
            }).length;
            document.getElementById('promoCount').innerText = filteredData.filter(d => (d.Status || d.change_status) === 'OFFER_CHANGED').length;
            document.getElementById('newCount').innerText = filteredData.filter(d => (d.Status || d.change_status) === 'NEW_ADDED').length;
        }

        function sortTable(column) {
            if (sortCol === column) sortAsc = !sortAsc;
            else { sortCol = column; sortAsc = true; }
            applySorting();
        }

        function applySorting() {
            if (!sortCol) return;
            
            const isPriceCol = colConfig[sortCol]?.isPrice;

            filteredData.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];
                
                if (valA === null || valA === undefined) valA = '';
                if (valB === null || valB === undefined) valB = '';

                // 價錢欄位轉數字排序，其他轉字串排序
                if (isPriceCol || sortCol.includes('price') || sortCol === 'cb_p' || sortCol === 'pb_p') {
                    valA = parseFloat(String(valA).replace(/[^0-9.-]+/g,"")) || 0;
                    valB = parseFloat(String(valB).replace(/[^0-9.-]+/g,"")) || 0;
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable();
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</body>
</html>
